<!DOCTYPE html>
<html>
<head>
    <title>Bad UI</title>
    <style>
        *{
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        html, body{
            height: 100%;
            background: #000;
            color: #fff;
        }
        body{
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
        }
        input{
            height: 30px;
            width: 150px;
            outline: 0;
            border-radius: 15px;
            margin-left: 10px;
            padding: 0 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
        }
        input::placeholder{
            color: #888;
        }
        #userNameInput{
            border-right: 0;
            border-bottom-right-radius: 0;
            border-top-right-radius: 0;
            padding-right: 0;
        }
        button{
            width: 75px;
            border-radius: 25px;
            cursor: pointer;
            background: #333;
            border: 1px solid #444;
            color: #fff;
        }
        button:hover{
            background: #444;
        }
        button, input{
            outline: 0;
        }
        #main{
            height: 350px;
            display: flex;
            flex-direction: column;
        }
        .itemDiv{
            display: flex;
            width: 150px;
            margin-top: 10px;
            justify-content: center;
        }
        .fallingDiv{
            position: absolute;
            height: 20px;
            font-size: 13.3333px;
            transform: rotate(0deg);
            color: #fff;
        }
        img{
            width: 150px;
            height: 180px;
            position: relative;
            margin-top: 20px;
            left: 100px;
            z-index: 5;
            filter: invert(1);
        }
    </style>
</head>
<body>
    <div id="main">
        <div class="itemDiv">
            <input id="userNameInput" placeholder="Username"/>
        </div>
        <div class="itemDiv">
            <input type="password" placeholder="Password"/>
        </div>
        <div class="itemDiv">
            <button>Sign Up</button>
        </div>
        <img id="bin" src="bin.png">
    </div>
<script>
var input = document.getElementById('userNameInput')
var y = input.getBoundingClientRect().top + 10
var x = input.getBoundingClientRect().left + 150

var mainDiv = document.getElementById('main')

var fallingDivs = []

input.addEventListener('input', () => {
    while(isOverflown(input)){
        let fallingChar = input.value.substr(-1)
        input.value = input.value.slice(0,-1)

        let fallingDiv = document.createElement('div')
        fallingDiv.innerText = fallingChar

        fallingDiv.classList.add('fallingDiv')
        fallingDiv.style.top = y +'px'
        fallingDiv.style.left = x + 'px'

        mainDiv.append(fallingDiv)
        fallingDivs.push(fallingDiv)
    }
})

function isOverflown(element) {
    return element.scrollWidth > element.clientWidth;
}

setInterval(() => {
    fallingDivs.forEach(fallingDiv => {
        if(Number(fallingDiv.style.top.slice(0,-2)) < document.getElementById('bin').getBoundingClientRect().top + 10){
        fallingDiv.style.top = Number(fallingDiv.style.top.slice(0,-2)) + 5 + 'px'
        fallingDiv.style.transform = 'rotate(' + (Number(fallingDiv.style.transform.slice(7,fallingDiv.style.transform.indexOf('d')))+5)+'deg)'
       }
    })
},40)
</script>
</body>
</html>
